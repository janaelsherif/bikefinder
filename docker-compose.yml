# Local development: PostgreSQL 16 + pgvector, Redis.
# Production: cyon.ch VPS + optional Hetzner workers (see README).

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ebf-postgres
    environment:
      POSTGRES_DB: bikefinder
      POSTGRES_USER: bikefinder
      POSTGRES_PASSWORD: bikefinder
    ports:
      - "5433:5432"
    volumes:
      - ebf_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bikefinder -d bikefinder"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ebf-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  ebf_pg_data:
